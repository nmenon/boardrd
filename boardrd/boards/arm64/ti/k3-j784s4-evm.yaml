# TI J784S4 EVM

name: k3-j784s4-evm
description: Texas Instruments J784S4 Evaluation Module

dtbs:
  - arch/arm64/boot/dts/ti/k3-j784s4-evm.dtb

workflows:
  - name: ufs
    boot_nodes:
      - /bus@100000/ufs@4e80000
  - name: mmc
    boot_nodes:
      - mmc0
      - mmc1
  - name: nfs
    boot_nodes:
      - ethernet0
      - mcu_cpsw
